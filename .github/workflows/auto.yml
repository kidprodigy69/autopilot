name: Auto — Flight Price Check

on:
  schedule:
    # 6am, noon, 6pm, midnight EDT (UTC-4 summer / UTC-5 winter)
    # Using EDT: 10:00, 16:00, 22:00, 04:00 UTC
    - cron: '0 10 * * *'   # 6am EDT
    - cron: '0 16 * * *'   # noon EDT
    - cron: '0 22 * * *'   # 6pm EDT
    - cron: '0 4 * * *'    # midnight EDT
  workflow_dispatch:

jobs:
  poll:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure git
        run: |
          git config user.name "Auto"
          git config user.email "auto@autopilot.onyx"

      - name: Validate secrets
        run: |
          if [ -z "$SERPAPI_KEY" ]; then
            echo "ERROR: SERPAPI_KEY secret is not set."
            echo "Go to repo Settings → Secrets → Actions and add SERPAPI_KEY."
            exit 1
          fi
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}

      - name: Run poll cycle
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python auto.py poll

      - name: Push price update
        run: |
          git add dashboard/frontend/public/data/autopilot.json \
                  dashboard/frontend/public/data/price_history.json \
                  data/api_budget.json \
                  data/price_baselines.json
          git diff --cached --quiet && echo "No changes to push." && exit 0
          git commit -m "Auto: price update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push origin main
