name: Auto — Flight Price Check

on:
  schedule:
    # Runs at 8am and 8pm EST (1pm and 1am UTC)
    - cron: '0 13,1 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  poll:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure git
        run: |
          git config user.name "Auto"
          git config user.email "auto@autopilot.onyx"

      - name: Run poll cycle
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python auto.py poll

      - name: Push price update
        run: |
          git add dashboard/frontend/public/data/autopilot.json \
                  dashboard/frontend/public/data/price_history.json
          git diff --cached --quiet && echo "No price changes" && exit 0
          git commit -m "Auto: price update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push origin main
